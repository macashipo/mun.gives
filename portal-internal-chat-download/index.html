<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Portal Internal Chat Download</title>
  </head>
  <body style="text-align: center; padding-top: 50px; font-family: sans-serif">
    <h1>Download Portal Internal Chat</h1>
    <p>Click nút dưới để tải app trên thiết bị của bạn:</p>

    <div style="margin-top: 30px">
      <a
        id="apk-link"
        href="https://github.com/macashipo/mun.gives/releases/tag/file_apk"
        style="
          display: inline-block;
          padding: 15px 30px;
          background-color: #34a853;
          color: white;
          text-decoration: none;
          border-radius: 8px;
          font-size: 18px;
        "
      >
        Đang tải thông tin...
      </a>
      <p id="apk-version" style="margin-top: 10px; color: #888; font-size: 14px"></p>
    </div>

    <div style="margin-top: 20px">
      <button
        disabled
        style="
          display: inline-block;
          padding: 15px 30px;
          background-color: #ccc;
          color: #888;
          border: none;
          border-radius: 8px;
          font-size: 18px;
          cursor: not-allowed;
        "
      >
        Cài iOS (Sắp có)
      </button>
    </div>

    <p style="margin-top: 20px; color: #555">
      Android: Cho phép cài từ nguồn không xác định trong Cài đặt để cài app.
    </p>

    <script>
      (function () {
        var REPO = "macashipo/mun.gives";
        var TAG = "file_apk";
        var linkEl = document.getElementById("apk-link");
        var versionEl = document.getElementById("apk-version");

        fetch("https://api.github.com/repos/" + REPO + "/releases/tags/" + TAG)
          .then(function (res) {
            if (!res.ok) throw new Error("GitHub API trả về " + res.status);
            return res.json();
          })
          .then(function (release) {
            var apks = (release.assets || []).filter(function (a) {
              return /\.apk$/i.test(a.name);
            });
            if (apks.length === 0) throw new Error("Không tìm thấy file APK");

            apks.sort(function (a, b) {
              return new Date(b.created_at) - new Date(a.created_at);
            });
            var latest = apks[0];

            linkEl.href = latest.browser_download_url;
            linkEl.textContent = "Cài Android (APK)";
            versionEl.textContent = latest.name;
          })
          .catch(function (err) {
            // Fallback: đưa người dùng tới trang release để tải thủ công
            linkEl.href =
              "https://github.com/" + REPO + "/releases/tag/" + TAG;
            linkEl.textContent = "Cài Android (APK)";
            versionEl.textContent =
              "Không tự tải được link mới nhất, bấm để mở trang tải.";
          });
      })();
    </script>
  </body>
</html>
